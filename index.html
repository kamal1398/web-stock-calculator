<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة الأسهم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a6fd4;
    --primary-light: #e8f0fb;
    --accent: #f59e0b;
    --bg: #f0f4fc;
    --bg-2: #ffffff;
    --bg-3: #f7f9ff;
    --bg-4: #eef2fb;
    --border: #d1daf5;
    --text: #1a2340;
    --text-dim: #6b7a9e;
    --green: #059669;
    --green-bg: #d1fae5;
    --green-border: #6ee7b7;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --red-border: #fca5a5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(26,111,212,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 32px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header-badge {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--primary);
    background: var(--primary-light);
    border: 1px solid #b8d0f5;
    padding: 7px 24px;
    border-radius: 24px;
    margin-bottom: 18px;
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1.1;
  }

  h1 span { color: var(--primary); }

  .header-line {
    width: 56px;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    margin: 16px auto 0;
    border-radius: 2px;
  }

  /* Card */
  .card {
    background: var(--bg-2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(26,111,212,0.08);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 24px;
    background: linear-gradient(135deg, var(--primary-light), #f0f7ff);
    border-bottom: 1.5px solid var(--border);
  }

  .card-num {
    width: 38px;
    height: 38px;
    background: var(--primary);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(26,111,212,0.35);
  }

  .card-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
  }

  /* Body & Fields */
  .card-body {
    padding: 24px 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  label {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-dim);
    padding-right: 4px;
  }

  .input-wrap {
    position: relative;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg-3);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px 18px 56px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 22px;
    font-weight: 800;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    direction: ltr;
    text-align: right;
    -webkit-appearance: none;
  }

  input[type="number"]:focus {
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(26,111,212,0.12);
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .input-unit {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    font-weight: 800;
    color: var(--primary);
    pointer-events: none;
    background: rgba(232,240,251,0.9);
    padding: 3px 8px;
    border-radius: 7px;
  }

  /* Divider */
  .divider {
    height: 1.5px;
    background: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 8px, transparent 8px, transparent 14px);
    margin: 24px 0;
  }

  /* Results */
  .results-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .result-box {
    background: var(--bg-4);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .result-label {
    font-size: 15px;
    color: var(--text-dim);
    font-weight: 700;
  }

  .result-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    direction: ltr;
  }

  .result-value.highlight {
    font-size: 22px;
    color: var(--primary);
  }

  /* Profit Card */
  .profit-card {
    background: var(--bg-4);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    margin-top: 14px;
  }

  .profit-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transition: all 0.4s;
  }

  .profit-card.profit-positive { border-color: var(--green-border); background: var(--green-bg); }
  .profit-card.profit-positive::before { background: linear-gradient(90deg, #059669, #34d399); }
  .profit-card.profit-negative { border-color: var(--red-border); background: var(--red-bg); }
  .profit-card.profit-negative::before { background: linear-gradient(90deg, #dc2626, #f87171); }

  .profit-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .profit-value {
    font-size: clamp(2.6rem, 11vw, 4rem);
    font-weight: 900;
    color: var(--text);
    direction: ltr;
    display: inline-block;
    transition: color 0.4s;
    line-height: 1.1;
  }

  .profit-value.positive { color: var(--green); }
  .profit-value.negative { color: var(--red); }

  .profit-unit {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-dim);
    margin-right: 6px;
  }

  .profit-pct {
    margin-top: 10px;
    font-size: 20px;
    font-weight: 800;
    color: var(--text-dim);
    direction: ltr;
    transition: color 0.4s;
  }

  .profit-pct.positive { color: var(--green); }
  .profit-pct.negative { color: var(--red); }

  /* Commission note */
  .commission-note {
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1.5px dashed var(--border);
    font-weight: 600;
  }

  .commission-note strong {
    color: var(--primary);
    font-weight: 900;
  }
</style>
</head>
  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
<body>
<div class="page-wrap">

  <div class="header">
    <div class="header-badge">بنك الأهلي التجاري</div>
    <h1>حاسبة <span>الأسهم</span></h1>
    <div class="header-line"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-num">1</div>
      <div class="card-title">حاسبة سهم</div>
    </div>

    <div class="card-body">

      <div class="field">
        <label>المبلغ المستثمر</label>
        <div class="input-wrap">
          <input type="number" id="amount" oninput="calculate()" min="0" step="0.01">
          <span class="input-unit">ر.س</span>
        </div>
      </div>

      <div class="field">
        <label>سعر الشراء</label>
        <div class="input-wrap">
          <input type="number" id="buy"    oninput="calculate()" min="0" step="0.01">
          <span class="input-unit">ر.س</span>
        </div>
      </div>

      <div class="field">
        <label>سعر البيع</label>
        <div class="input-wrap">
          <input type="number" id="sell" oninput="calculate()" min="0" step="0.01">
          <span class="input-unit">ر.س</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="results-col">
        <div class="result-box">
          <span class="result-label">عدد الأسهم</span>
          <span class="result-value highlight" id="shares">—</span>
        </div>
        <div class="result-box">
          <span class="result-label">عمولة الشراء</span>
          <span class="result-value" id="buy-comm">—</span>
        </div>
        <div class="result-box">
          <span class="result-label">عمولة البيع</span>
          <span class="result-value" id="sell-comm">—</span>
        </div>
        <div class="result-box">
          <span class="result-label">قيمة البيع الإجمالية</span>
          <span class="result-value" id="sell-total">—</span>
        </div>
      </div>

      <div class="profit-card" id="profit-card">
        <div class="profit-label">الربح أو الخسارة</div>
        <div>
          <span class="profit-value" id="profit">أدخل القيم</span>
          <span class="profit-unit" id="profit-unit" style="display:none">ر.س</span>
        </div>
        <div class="profit-pct" id="profit-pct"></div>
      </div>

    </div>
  </div>

  <div class="commission-note">
    نسبة العمولة: <strong>0.155%</strong> من قيمة الصفقة عند الشراء والبيع
  </div>

</div>

<script>
const COMMISSION_RATE = 0.05;

function fmt(n) {
  if (isNaN(n) || n === null) return '—';
  return n.toLocaleString('ar-SA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtNum(n) {
  if (isNaN(n) || n === null) return '—';
  return n.toFixed(2);
}

function calculate() {
  const amount    = parseFloat(document.getElementById('amount').value);
  const buyPrice  = parseFloat(document.getElementById('buy').value);
  const sellPrice = parseFloat(document.getElementById('sell').value);

  const sharesEl     = document.getElementById('shares');
  const buyCommEl    = document.getElementById('buy-comm');
  const sellCommEl   = document.getElementById('sell-comm');
  const sellTotalEl  = document.getElementById('sell-total');
  const profitEl     = document.getElementById('profit');
  const profitUnitEl = document.getElementById('profit-unit');
  const profitPctEl  = document.getElementById('profit-pct');
  const profitCard   = document.getElementById('profit-card');

  if (!isNaN(amount) && !isNaN(buyPrice) && buyPrice > 0) {
    const shares  = amount / buyPrice;
    const buyComm = amount * COMMISSION_RATE;
    sharesEl.textContent  = fmtNum(shares);
    buyCommEl.textContent = fmt(buyComm) + ' ر.س';

    if (!isNaN(sellPrice) && sellPrice > 0) {
      const sellTotal = shares * sellPrice;
      const sellComm  = amount * COMMISSION_RATE;
      const profit    = sellTotal - sellComm - buyComm - amount;
      const profitPct = (profit / amount) * 100;

      sellCommEl.textContent  = fmt(sellComm) + ' ر.س';
      sellTotalEl.textContent = fmtNum(sellTotal) + ' ر.س';
      profitEl.textContent    = fmtNum(profit);
      profitUnitEl.style.display = 'inline';

      profitCard.classList.remove('profit-positive', 'profit-negative');
      profitEl.classList.remove('positive', 'negative');
      profitPctEl.classList.remove('positive', 'negative');

      if (profit > 0) {
        profitCard.classList.add('profit-positive');
        profitEl.classList.add('positive');
        profitPctEl.classList.add('positive');
        profitPctEl.textContent = `▲ ${fmt(profitPct)}%`;
      } else if (profit < 0) {
        profitCard.classList.add('profit-negative');
        profitEl.classList.add('negative');
        profitPctEl.classList.add('negative');
        profitPctEl.textContent = `▼ ${fmt(Math.abs(profitPct))}%`;
      } else {
        profitPctEl.textContent = '0.00%';
      }

    } else {
      sellCommEl.textContent  = '—';
      sellTotalEl.textContent = '—';
      profitEl.textContent    = 'أدخل سعر البيع';
      profitEl.className      = 'profit-value';
      profitUnitEl.style.display = 'none';
      profitPctEl.textContent = '';
      profitCard.classList.remove('profit-positive', 'profit-negative');
    }

  } else {
    sharesEl.textContent    = '—';
    buyCommEl.textContent   = '—';
    sellCommEl.textContent  = '—';
    sellTotalEl.textContent = '—';
    profitEl.textContent    = 'أدخل القيم';
    profitEl.className      = 'profit-value';
    profitUnitEl.style.display = 'none';
    profitPctEl.textContent = '';
    profitCard.classList.remove('profit-positive', 'profit-negative');
  }
}
</script>
</body>
</html>
